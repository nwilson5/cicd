# Example: how a project repo's .github/workflows/ci.yml uses the shared templates.
# Copy this to <project-repo>/.github/workflows/ci.yml and adjust inputs.
#
# Required GitHub Actions variables in the project repo (Settings > Secrets and variables > Variables):
#   VAULT_ADDR  — https://vault.example.com
#
# Required GitHub secrets in the project repo:
#   VPS_HOST    — VPS IP or hostname
#   VPS_SSH_KEY — private key for the deploy user
#
# Required Vault setup per project:
#   - A `ci` JWT role bound to the repo + event_name: pull_request
#   - A policy granting read on secret/data/<project>/ci
#   - Secrets stored at secret/<project>/ci
#   See nwilson5/nwmain platform/ansible/roles/vault_auth for the Ansible tasks that set this up.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # --- PR checks (runs on every pull request) ---

  validate:
    uses: nwilson5/cicd/.github/workflows/validate.yml@main

  # Optional: fetch CI secrets from Vault during PR checks (e.g. for integration tests).
  # Requires a `ci` Vault JWT role bound to event_name: pull_request for this repo.
  # pr-secrets:
  #   if: github.event_name == 'pull_request'
  #   runs-on: ubuntu-latest
  #   permissions:
  #     id-token: write
  #     contents: read
  #   steps:
  #     - uses: hashicorp/vault-action@v3
  #       with:
  #         url: ${{ vars.VAULT_ADDR }}
  #         method: jwt
  #         role: ci
  #         jwtGithubAudience: ${{ vars.VAULT_ADDR }}
  #         secrets: |
  #           secret/data/my-app/ci some_api_key | SOME_API_KEY

  # --- Deploy (runs on merge to main only) ---

  build:
    needs: validate
    if: github.ref == 'refs/heads/main'
    uses: nwilson5/cicd/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/nwilson5/my-app   # change to your image name

  deploy:
    needs: build
    uses: nwilson5/cicd/.github/workflows/deploy-vps.yml@main
    with:
      project: my-app                   # matches /opt/my-app/ on the VPS
      image-tag: ${{ needs.build.outputs.image-tag }}
      vault_addr: ${{ secrets.VAULT_ADDR }}
      vault_role: project-my-app        # must exist in Vault JWT auth
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

