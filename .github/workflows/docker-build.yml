name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
        description: "Full image name without tag, e.g. ghcr.io/nwilson5/my-app"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      platforms:
        type: string
        default: "linux/amd64"
    outputs:
      image-tag:
        description: "Full image reference with short SHA tag, e.g. ghcr.io/nwilson5/my-app:a1b2c3d"
        value: ${{ jobs.build.outputs.image-tag }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.sha-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract SHA tag
        id: sha-tag
        run: echo "tag=${{ inputs.image }}:$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
