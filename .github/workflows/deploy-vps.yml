name: Deploy to VPS

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
        description: "Project name — compose file deployed to ~/projects/<project>/docker-compose.yml on the VPS"
      image-tag:
        required: true
        type: string
        description: "Full image reference to deploy, e.g. ghcr.io/nwilson5/my-app:a1b2c3d"
      vault_addr:
        required: true
        type: string
      vault_role:
        required: true
        type: string
        description: "Vault JWT role for this project, e.g. project-my-app"
      shared_vault_paths:
        required: false
        type: string
        default: ""
        description: "Space-separated list of extra Vault KV paths to merge into .env, e.g. 'secret/shared/gemini secret/shared/github'"
    secrets:
      VPS_HOST:
        required: true
      VPS_SSH_KEY:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_addr }}
          exportToken: true

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          port: 2222
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ~/projects/${{ inputs.project }}/

      - name: Verify host reachable
        run: |
          host=$(echo "${{ secrets.VPS_HOST }}" | tr -d '[:space:]')
          echo "Host: ${#host} chars, ends with: ${host: -10}"
          nslookup "$host" && echo "DNS OK" || { echo "DNS FAILED"; exit 1; }
          nc -zw5 "$host" 2222 && echo "Port 2222 open" || { echo "Port 2222 unreachable"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.4
        env:
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          VAULT_ADDR: ${{ inputs.vault_addr }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          port: 2222
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VAULT_TOKEN,VAULT_ADDR,IMAGE_TAG
          script: |
            set -euo pipefail
            PROJECT_DIR="$HOME/projects/${{ inputs.project }}"
            mkdir -p "$PROJECT_DIR"

            # Write .env from Vault (values quoted, newlines escaped for multiline secrets)
            vault kv get -format=json "secret/projects/${{ inputs.project }}/env" \
              | jq -r '.data.data | to_entries[] | "\(.key)=\"\(.value | gsub("\n";"\\n"))\"" ' \
              > "$PROJECT_DIR/.env"
            chmod 600 "$PROJECT_DIR/.env"

            # Append shared secrets (each path is a separate KV entry)
            for shared_path in ${{ inputs.shared_vault_paths }}; do
              vault kv get -format=json "$shared_path" \
                | jq -r '.data.data | to_entries[] | "\(.key)=\"\(.value | gsub("\n";"\\n"))\"" ' \
                >> "$PROJECT_DIR/.env"
            done

            # Persist IMAGE_TAG so manual docker compose commands work without it set in the shell
            echo "IMAGE_TAG=\"$IMAGE_TAG\"" >> "$PROJECT_DIR/.env"

            # Pull the new image
            docker pull "$IMAGE_TAG"

            # Rolling update — zero downtime if health checks are configured
            IMAGE_TAG="$IMAGE_TAG" docker compose -f "$PROJECT_DIR/docker-compose.yml" up -d --remove-orphans

            # Wait for health checks to pass
            docker compose -f "$PROJECT_DIR/docker-compose.yml" ps
