name: Validate

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      python-version:
        type: string
        default: "3.12"
      node-version:
        type: string
        default: "20"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "type=go" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.detect.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Python lint + test
        if: steps.detect.outputs.type == 'python'
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt
          python -m ruff check . 2>/dev/null || true
          python -m pytest --tb=short

      - name: Set up Node
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Node lint + test
        if: steps.detect.outputs.type == 'node'
        run: |
          npm ci
          npm run lint --if-present
          npm test

      - name: Set up Go
        if: steps.detect.outputs.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet + test
        if: steps.detect.outputs.type == 'go'
        run: |
          go vet ./...
          go test ./...
