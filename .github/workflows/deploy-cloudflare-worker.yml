name: Deploy Cloudflare Worker

on:
  workflow_call:
    inputs:
      worker-name:
        required: true
        type: string
        description: "Worker name as defined in wrangler.toml"
      environment:
        type: string
        default: ""
        description: "Wrangler environment to deploy to (e.g. sandbox). Leave empty to deploy the default environment."
      vault_addr:
        required: true
        type: string
      vault_role:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Vault and fetch Cloudflare token
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_addr }}
          secrets: "secret/data/infra/cloudflare api_token | CLOUDFLARE_API_TOKEN"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          command: deploy${{ inputs.environment != '' && format(' --env {0}', inputs.environment) || '' }}
